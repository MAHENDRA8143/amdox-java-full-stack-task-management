spring.application.name=amdox-task-manager

# Server
server.port=8080
server.servlet.context-path=/api

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/amdox_taskdb
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=amdox_task_management_secret_key_2024_very_secure_key_minimum_32_characters_long
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.amdox=DEBUG

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173
